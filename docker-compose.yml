version: '3.8'

services:
  djdutts-api:
    build: .
    container_name: djdutts-api
    ports:
      - "8011:8011"
    environment:
      - PYTHONUNBUFFERED=1
      - QA_DATASET_PATH=/app/files/hr_interview_questions_dataset.json
      - INTERVIEW_FILES_DIR=/app/files/interview_2
    volumes:
      - ./files:/app/files:ro
      - ./faiss_index.index:/app/faiss_index.index
    working_dir: /app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

version: '3.8'

services:
  djdutts-api:
    build: .
    container_name: djdutts-api
    ports:
      - "8011:8011"
    environment:
      - PYTHONUNBUFFERED=1
      - INTERVIEW_FILES_DIR=/app/files/interview_2
      - FAISS_INDEX_PATH=/app/data/faiss_index
    volumes:
      - ./files:/app/files:ro
      - ./data:/app/data
    working_dir: /app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

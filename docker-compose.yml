services:
  djdutts-api:
    build: .
    container_name: djdutts-api
    command: uvicorn main:app --host 0.0.0.0 --port 8011
    ports:
      - "8011:8011"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - INTERVIEW_FILES_DIR=/app/files/interview_2
      - FAISS_INDEX_PATH=/app/data/faiss_index
    volumes:
      - ./files:/app/files:ro
      - ./data:/app/data
    working_dir: /app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8011/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
